/* ============ CHARACTER SVG BUILDER ============ */
function mkSVG(t,sz){
const s=sz||160,cx=s/2;
const P=t.pal; // {body,light,dark,ear,earIn,cheek,acc}
let svg=`<svg viewBox="0 0 ${s} ${s+20}" width="${s}" height="${s+20}" xmlns="http://www.w3.org/2000/svg">`;
// Glow
svg+=`<defs><radialGradient id="glow${s}"><stop offset="0%" stop-color="${P.body}" stop-opacity=".3"/><stop offset="100%" stop-color="${P.body}" stop-opacity="0"/></radialGradient></defs>`;
svg+=`<ellipse cx="${cx}" cy="${s*.55}" rx="${s*.48}" ry="${s*.48}" fill="url(#glow${s})"/>`;

const A=t.animal;
// TAIL
if(A==='puppy'||A==='fox'||A==='shiba'){
  const tx=s*.82,ty=s*.62;
  svg+=`<ellipse cx="${tx}" cy="${ty}" rx="${s*.08}" ry="${s*.12}" fill="${P.body}" transform="rotate(-20 ${tx} ${ty})"/>`;
}else if(A==='cat'||A==='wildcat'||A==='kitten'){
  svg+=`<path d="M${s*.8} ${s*.65} Q${s*.95} ${s*.5} ${s*.88} ${s*.4}" stroke="${P.body}" stroke-width="${s*.04}" fill="none" stroke-linecap="round"/>`;
}else if(A==='bunny'||A==='wbunny'){
  svg+=`<circle cx="${s*.78}" cy="${s*.7}" r="${s*.04}" fill="${P.light}"/>`;
}else if(A==='otter'){
  svg+=`<path d="M${s*.78} ${s*.68} Q${s*.92} ${s*.72} ${s*.9} ${s*.55}" stroke="${P.body}" stroke-width="${s*.03}" fill="none" stroke-linecap="round"/>`;
}else if(A==='chinchilla'){
  svg+=`<ellipse cx="${s*.8}" cy="${s*.65}" rx="${s*.1}" ry="${s*.08}" fill="${P.light}" transform="rotate(-15 ${s*.8} ${s*.65})"/>`;
}

// BODY (oval torso)
svg+=`<ellipse cx="${cx}" cy="${s*.68}" rx="${s*.25}" ry="${s*.2}" fill="${P.body}"/>`;
// Belly patch
svg+=`<ellipse cx="${cx}" cy="${s*.7}" rx="${s*.16}" ry="${s*.13}" fill="${P.light}"/>`;

// FEET
svg+=`<ellipse cx="${cx-s*.12}" cy="${s*.86}" rx="${s*.07}" ry="${s*.04}" fill="${P.dark}"/>`;
svg+=`<ellipse cx="${cx+s*.12}" cy="${s*.86}" rx="${s*.07}" ry="${s*.04}" fill="${P.dark}"/>`;

// ARMS
svg+=`<ellipse cx="${cx-s*.24}" cy="${s*.64}" rx="${s*.05}" ry="${s*.08}" fill="${P.body}" transform="rotate(15 ${cx-s*.24} ${s*.64})"/>`;
svg+=`<ellipse cx="${cx+s*.24}" cy="${s*.64}" rx="${s*.05}" ry="${s*.08}" fill="${P.body}" transform="rotate(-15 ${cx+s*.24} ${s*.64})"/>`;

// HEAD
svg+=`<ellipse cx="${cx}" cy="${s*.38}" rx="${s*.28}" ry="${s*.26}" fill="${P.body}"/>`;

// EARS
if(A==='bunny'||A==='wbunny'){
  // Long floppy ears
  svg+=`<ellipse cx="${cx-s*.14}" cy="${s*.12}" rx="${s*.07}" ry="${s*.2}" fill="${P.ear}" transform="rotate(-8 ${cx-s*.14} ${s*.12})"/>`;
  svg+=`<ellipse cx="${cx-s*.14}" cy="${s*.12}" rx="${s*.04}" ry="${s*.14}" fill="${P.earIn}" transform="rotate(-8 ${cx-s*.14} ${s*.12})"/>`;
  svg+=`<ellipse cx="${cx+s*.14}" cy="${s*.12}" rx="${s*.07}" ry="${s*.2}" fill="${P.ear}" transform="rotate(8 ${cx+s*.14} ${s*.12})"/>`;
  svg+=`<ellipse cx="${cx+s*.14}" cy="${s*.12}" rx="${s*.04}" ry="${s*.14}" fill="${P.earIn}" transform="rotate(8 ${cx+s*.14} ${s*.12})"/>`;
}else if(A==='cat'||A==='wildcat'||A==='kitten'){
  svg+=`<polygon points="${cx-s*.22},${s*.22} ${cx-s*.08},${s*.22} ${cx-s*.17},${s*.05}" fill="${P.ear}"/>`;
  svg+=`<polygon points="${cx-s*.2},${s*.2} ${cx-s*.1},${s*.2} ${cx-s*.16},${s*.09}" fill="${P.earIn}"/>`;
  svg+=`<polygon points="${cx+s*.22},${s*.22} ${cx+s*.08},${s*.22} ${cx+s*.17},${s*.05}" fill="${P.ear}"/>`;
  svg+=`<polygon points="${cx+s*.2},${s*.2} ${cx+s*.1},${s*.2} ${cx+s*.17},${s*.09}" fill="${P.earIn}"/>`;
}else if(A==='fox'){
  svg+=`<polygon points="${cx-s*.24},${s*.22} ${cx-s*.06},${s*.22} ${cx-s*.18},${s*.01}" fill="${P.ear}"/>`;
  svg+=`<polygon points="${cx-s*.21},${s*.2} ${cx-s*.09},${s*.2} ${cx-s*.17},${s*.06}" fill="${P.earIn}"/>`;
  svg+=`<polygon points="${cx+s*.24},${s*.22} ${cx+s*.06},${s*.22} ${cx+s*.18},${s*.01}" fill="${P.ear}"/>`;
  svg+=`<polygon points="${cx+s*.21},${s*.2} ${cx+s*.09},${s*.2} ${cx+s*.17},${s*.06}" fill="${P.earIn}"/>`;
}else if(A==='puppy'){
  svg+=`<ellipse cx="${cx-s*.22}" cy="${s*.28}" rx="${s*.1}" ry="${s*.13}" fill="${P.ear}" transform="rotate(20 ${cx-s*.22} ${s*.28})"/>`;
  svg+=`<ellipse cx="${cx+s*.22}" cy="${s*.28}" rx="${s*.1}" ry="${s*.13}" fill="${P.ear}" transform="rotate(-20 ${cx+s*.22} ${s*.28})"/>`;
}else if(A==='shiba'){
  svg+=`<polygon points="${cx-s*.22},${s*.22} ${cx-s*.08},${s*.24} ${cx-s*.17},${s*.08}" fill="${P.ear}"/>`;
  svg+=`<polygon points="${cx+s*.22},${s*.22} ${cx+s*.08},${s*.24} ${cx+s*.17},${s*.08}" fill="${P.ear}"/>`;
}else if(A==='chick'||A==='parakeet'){
  // tiny wings on head
  svg+=`<ellipse cx="${cx-s*.18}" cy="${s*.18}" rx="${s*.05}" ry="${s*.04}" fill="${P.ear}" transform="rotate(-20 ${cx-s*.18} ${s*.18})"/>`;
  svg+=`<ellipse cx="${cx+s*.18}" cy="${s*.18}" rx="${s*.05}" ry="${s*.04}" fill="${P.ear}" transform="rotate(20 ${cx+s*.18} ${s*.18})"/>`;
  if(A==='parakeet'){
    svg+=`<ellipse cx="${cx}" cy="${s*.14}" rx="${s*.03}" ry="${s*.06}" fill="${P.acc}"/>`;
  }
}else if(A==='hamster'||A==='chinchilla'){
  svg+=`<circle cx="${cx-s*.2}" cy="${s*.2}" r="${s*.08}" fill="${P.ear}"/>`;
  svg+=`<circle cx="${cx-s*.2}" cy="${s*.2}" r="${s*.05}" fill="${P.earIn}"/>`;
  svg+=`<circle cx="${cx+s*.2}" cy="${s*.2}" r="${s*.08}" fill="${P.ear}"/>`;
  svg+=`<circle cx="${cx+s*.2}" cy="${s*.2}" r="${s*.05}" fill="${P.earIn}"/>`;
}else if(A==='owl'){
  svg+=`<polygon points="${cx-s*.26},${s*.24} ${cx-s*.14},${s*.26} ${cx-s*.22},${s*.1}" fill="${P.ear}"/>`;
  svg+=`<polygon points="${cx+s*.26},${s*.24} ${cx+s*.14},${s*.26} ${cx+s*.22},${s*.1}" fill="${P.ear}"/>`;
}else if(A==='hedgehog'){
  for(let i=-3;i<=3;i++){
    const ang=i*18-90,rad=ang*Math.PI/180;
    const bx=cx+Math.cos(rad)*s*.3,by=s*.25+Math.sin(rad)*s*.25;
    svg+=`<line x1="${cx+Math.cos(rad)*s*.2}" y1="${s*.3+Math.sin(rad)*s*.18}" x2="${bx}" y2="${by}" stroke="${P.ear}" stroke-width="${s*.025}" stroke-linecap="round"/>`;
  }
}else if(A==='penguin'){
  // penguins have no visible ears, but add a tuxedo marking
}

// FACE - Eyes
const eyeY=s*.36,eyeR=s*.035;
svg+=`<ellipse cx="${cx-s*.1}" cy="${eyeY}" rx="${eyeR}" ry="${eyeR*1.2}" fill="#1a1030"/>`;
svg+=`<ellipse cx="${cx+s*.1}" cy="${eyeY}" rx="${eyeR}" ry="${eyeR*1.2}" fill="#1a1030"/>`;
// Eye shine
svg+=`<circle cx="${cx-s*.09}" cy="${eyeY-s*.015}" r="${eyeR*.45}" fill="#fff"/>`;
svg+=`<circle cx="${cx+s*.11}" cy="${eyeY-s*.015}" r="${eyeR*.45}" fill="#fff"/>`;

// Blush
svg+=`<ellipse cx="${cx-s*.17}" cy="${s*.42}" rx="${s*.05}" ry="${s*.025}" fill="${P.cheek}" opacity=".5"/>`;
svg+=`<ellipse cx="${cx+s*.17}" cy="${s*.42}" rx="${s*.05}" ry="${s*.025}" fill="${P.cheek}" opacity=".5"/>`;

// Mouth
if(A==='chick'||A==='parakeet'){
  svg+=`<polygon points="${cx-s*.03},${s*.44} ${cx},${s*.48} ${cx+s*.03},${s*.44}" fill="${P.acc}"/>`;
}else{
  svg+=`<path d="M${cx-s*.03} ${s*.445} Q${cx} ${s*.48} ${cx+s*.03} ${s*.445}" stroke="${P.dark}" stroke-width="${s*.012}" fill="none" stroke-linecap="round"/>`;
}

// Penguin tuxedo
if(A==='penguin'){
  svg+=`<ellipse cx="${cx}" cy="${s*.38}" rx="${s*.18}" ry="${s*.18}" fill="${P.light}"/>`;
  // Re-draw eyes on top
  svg+=`<ellipse cx="${cx-s*.08}" cy="${eyeY}" rx="${eyeR}" ry="${eyeR*1.2}" fill="#1a1030"/>`;
  svg+=`<ellipse cx="${cx+s*.08}" cy="${eyeY}" rx="${eyeR}" ry="${eyeR*1.2}" fill="#1a1030"/>`;
  svg+=`<circle cx="${cx-s*.07}" cy="${eyeY-s*.015}" r="${eyeR*.45}" fill="#fff"/>`;
  svg+=`<circle cx="${cx+s*.09}" cy="${eyeY-s*.015}" r="${eyeR*.45}" fill="#fff"/>`;
  svg+=`<ellipse cx="${cx-s*.13}" cy="${s*.42}" rx="${s*.04}" ry="${s*.02}" fill="${P.cheek}" opacity=".5"/>`;
  svg+=`<ellipse cx="${cx+s*.13}" cy="${s*.42}" rx="${s*.04}" ry="${s*.02}" fill="${P.cheek}" opacity=".5"/>`;
  svg+=`<path d="M${cx-s*.03} ${s*.445} Q${cx} ${s*.48} ${cx+s*.03} ${s*.445}" stroke="${P.dark}" stroke-width="${s*.012}" fill="none" stroke-linecap="round"/>`;
}

// ACCESSORY
if(t.accessory==='ribbon'){
  svg+=`<circle cx="${cx+s*.16}" cy="${s*.18}" r="${s*.04}" fill="${P.acc}"/>`;
  svg+=`<polygon points="${cx+s*.1},${s*.18} ${cx+s*.16},${s*.15} ${cx+s*.16},${s*.21}" fill="${P.acc}"/>`;
  svg+=`<polygon points="${cx+s*.22},${s*.18} ${cx+s*.16},${s*.15} ${cx+s*.16},${s*.21}" fill="${P.acc}"/>`;
}else if(t.accessory==='crown'){
  svg+=`<polygon points="${cx-s*.08},${s*.14} ${cx-s*.05},${s*.08} ${cx},${s*.12} ${cx+s*.05},${s*.08} ${cx+s*.08},${s*.14}" fill="${P.acc}"/>`;
}else if(t.accessory==='star'){
  const stx=cx+s*.2,sty=s*.16;
  svg+=`<polygon points="${stx},${sty-s*.04} ${stx+s*.015},${sty-s*.01} ${stx+s*.04},${sty-s*.01} ${stx+s*.02},${sty+s*.01} ${stx+s*.03},${sty+s*.04} ${stx},${sty+s*.02} ${stx-s*.03},${sty+s*.04} ${stx-s*.02},${sty+s*.01} ${stx-s*.04},${sty-s*.01} ${stx-s*.015},${sty-s*.01}" fill="${P.acc}"/>`;
}else if(t.accessory==='scarf'){
  svg+=`<rect x="${cx-s*.22}" y="${s*.5}" width="${s*.44}" height="${s*.06}" rx="${s*.03}" fill="${P.acc}" opacity=".8"/>`;
}else if(t.accessory==='glasses'){
  svg+=`<circle cx="${cx-s*.1}" cy="${eyeY}" r="${s*.055}" stroke="${P.acc}" stroke-width="${s*.01}" fill="none"/>`;
  svg+=`<circle cx="${cx+s*.1}" cy="${eyeY}" r="${s*.055}" stroke="${P.acc}" stroke-width="${s*.01}" fill="none"/>`;
  svg+=`<line x1="${cx-s*.045}" y1="${eyeY}" x2="${cx+s*.045}" y2="${eyeY}" stroke="${P.acc}" stroke-width="${s*.008}"/>`;
}else if(t.accessory==='flower'){
  const fx=cx-s*.2,fy=s*.2;
  for(let i=0;i<5;i++){const a=i*72*Math.PI/180;svg+=`<circle cx="${fx+Math.cos(a)*s*.025}" cy="${fy+Math.sin(a)*s*.025}" r="${s*.02}" fill="${P.acc}" opacity=".9"/>`;}
  svg+=`<circle cx="${fx}" cy="${fy}" r="${s*.015}" fill="${P.cheek}"/>`;
}else if(t.accessory==='bowtie'){
  svg+=`<polygon points="${cx-s*.08},${s*.53} ${cx},${s*.5} ${cx},${s*.56}" fill="${P.acc}"/>`;
  svg+=`<polygon points="${cx+s*.08},${s*.53} ${cx},${s*.5} ${cx},${s*.56}" fill="${P.acc}"/>`;
  svg+=`<circle cx="${cx}" cy="${s*.53}" r="${s*.015}" fill="${P.acc}"/>`;
}else if(t.accessory==='bandana'){
  svg+=`<path d="M${cx-s*.26} ${s*.3} Q${cx} ${s*.35} ${cx+s*.26} ${s*.3}" stroke="${P.acc}" stroke-width="${s*.03}" fill="none" stroke-linecap="round" opacity=".7"/>`;
}else if(t.accessory==='cap'){
  svg+=`<ellipse cx="${cx}" cy="${s*.2}" rx="${s*.25}" ry="${s*.06}" fill="${P.acc}"/>`;
  svg+=`<path d="M${cx-s*.22} ${s*.2} Q${cx} ${s*.08} ${cx+s*.22} ${s*.2}" fill="${P.acc}"/>`;
}

svg+=`</svg>`;
return svg;
}
